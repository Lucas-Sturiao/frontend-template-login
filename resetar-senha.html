<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex justify-center items-center p-6 text-gray-800">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-center">Criar Nova Senha</h2>
        
        <form id="form-reset" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nova Senha</label>
                <input type="password" id="nova-senha" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition-colors">
                Confirmar Redefinição
            </button>
        </form>

        <div id="status-message" class="mt-4 text-center hidden min-h-[40px]"></div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-blue-600 hover:underline font-medium">Voltar para o Login</a>
        </div>
    </div>

    <script>
        document.getElementById('form-reset').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const novaSenha = document.getElementById('nova-senha').value;
            
            const statusMessage = document.getElementById('status-message');
            const btnSubmit = document.getElementById('btn-submit');

            statusMessage.classList.remove('hidden');

            if (!token) {
                statusMessage.innerHTML = "<span class='text-red-500 font-medium'>Token inválido ou não fornecido.</span>";
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Processando...";

            try {
                const response = await fetch('http://127.0.0.1:8000/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        nova_senha: novaSenha
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusMessage.innerHTML = `<span class='text-green-600 font-medium'>${data.mensagem}</span>`;
                    document.getElementById('form-reset').reset();
                } else {
                    statusMessage.innerHTML = `<span class='text-red-500 font-medium'>${data.detail}</span>`;
                }
            } catch (error) {
                statusMessage.innerHTML = "<span class='text-red-500 font-medium'>Erro ao conectar com o servidor.</span>";
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Confirmar Redefinição";
            }
        });
    </script>
</body>
</html>
