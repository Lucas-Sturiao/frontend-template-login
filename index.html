<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Template Frontend</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Meu Template de login</h1>

        <div id="alert-box" class="hidden mb-4 p-3 rounded text-sm text-center font-medium"></div>

        <div id="auth-section">
            <div class="flex border-b mb-4">
                <button id="tab-login" class="w-1/2 py-2 text-blue-600 border-b-2 border-blue-600 font-semibold" onclick="switchTab('login')">Entrar</button>
                <button id="tab-register" class="w-1/2 py-2 text-gray-500 font-semibold" onclick="switchTab('register')">Criar Conta</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">E-mail</label>
                    <input type="email" id="email" class="w-full border rounded px-3 py-2 focus:outline-none focus:border-blue-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="password" class="w-full border rounded px-3 py-2 focus:outline-none focus:border-blue-500" required>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white rounded py-2 font-semibold hover:bg-blue-700 transition">
                    Entrar
                </button>
            </form>
        </div>

        <div id="dashboard-section" class="hidden text-center">
            <div class="bg-green-100 text-green-800 p-4 rounded-lg mb-6 border border-green-200">
                <p class="font-semibold">Autenticado com sucesso!</p>
                <p class="text-sm mt-2">Bem-vindo, <span id="user-email" class="font-bold"></span></p>
            </div>
            
            <button onclick="fetchProfile()" class="mb-4 bg-gray-100 text-gray-700 px-4 py-2 rounded shadow hover:bg-gray-200 text-sm">
                Recarregar Meus Dados (Testar Token)
            </button>

            <button onclick="logout()" class="w-full border border-red-500 text-red-500 rounded py-2 font-semibold hover:bg-red-50 transition">
                Sair (Logout)
            </button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
