<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso à Conta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h1 class="brand-title">Painel de Acesso</h1>

            <div id="alert-box" class="alert hidden"></div>

            <div id="auth-section">
                <div class="tabs">
                    <button id="tab-login" class="tab active" onclick="switchTab('login')">Entrar</button>
                    <button id="tab-register" class="tab" onclick="switchTab('register')">Criar Conta</button>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="seu@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="submit-btn" class="btn-primary">Entrar</button>
                </form>
            </div>

            <div id="dashboard-section" class="hidden text-center">
                <div class="success-card">
                    <p class="status-title">Autenticado com sucesso!</p>
                    <p class="status-subtitle">Bem-vindo, <span id="user-email"></span></p>
                </div>
                
                <button onclick="fetchProfile()" class="btn-secondary">
                    Recarregar Dados
                </button>

                <button onclick="logout()" class="btn-danger">
                    Sair da Conta
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
